name: License Check

on:
  push:
    branches:
      - main
  workflow_call:

permissions:
  pull-requests: write
  issues: write


jobs:
  license-check:
    uses: eclipse-score/cicd-workflows/.github/workflows/license-check.yml@2f846ffe7c6e64c790b1f66f5b504622cd03526e # main (2026-03-31)
    secrets:
      dash-api-token: ${{ secrets.ECLIPSE_GITLAB_API_TOKEN }}
